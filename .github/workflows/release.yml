name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Run hermetic Docker acceptance
        id: docker-acceptance
        continue-on-error: true
        env:
          EQUIP_DOCKER_ACCEPTANCE_OUTPUT_DIR: .generated/docker-acceptance
        run: npm run test:docker:acceptance

      - name: Upload Docker acceptance artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-acceptance
          path: .generated/docker-acceptance/*
          if-no-files-found: error

      - name: Verify packed npm artifact
        id: pack-verification
        continue-on-error: true
        env:
          PACK_VERIFICATION_OUTPUT_PATH: .generated/pack/pack-verification.json
          PACK_VERIFICATION_LOG_PATH: .generated/pack/pack-verification.log
          PACK_TARBALL_OUTPUT_DIR: .generated/pack/tarball
        run: npm run test:pack

      - name: Smoke install packed npm tarball
        id: pack-install-smoke
        if: ${{ always() }}
        continue-on-error: true
        env:
          PACK_TARBALL_OUTPUT_DIR: .generated/pack/tarball
          PACK_INSTALL_SMOKE_OUTPUT_PATH: .generated/pack/pack-install-smoke.json
          PACK_INSTALL_SMOKE_LOG_PATH: .generated/pack/pack-install-smoke.log
        run: npm run test:pack:smoke

      - name: Upload pack verification
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pack-verification
          path: |
            .generated/pack/pack-verification.json
            .generated/pack/pack-verification.log
          if-no-files-found: ignore

      - name: Upload packed npm tarball
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pack-tarball
          path: .generated/pack/tarball/*.tgz
          if-no-files-found: ignore

      - name: Upload pack install smoke report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pack-install-smoke
          path: |
            .generated/pack/pack-install-smoke.json
            .generated/pack/pack-install-smoke.log
          if-no-files-found: ignore

      - name: Write release verification report
        if: ${{ always() }}
        env:
          PACK_VERIFICATION_PATH: .generated/pack/pack-verification.json
          PACK_INSTALL_SMOKE_PATH: .generated/pack/pack-install-smoke.json
          PACK_TARBALL_DIR: .generated/pack/tarball
          DOCKER_ACCEPTANCE_REPORT_PATH: .generated/docker-acceptance/docker-acceptance-report.json
          PACK_VERIFICATION_ARTIFACT_NAME: pack-verification
          PACK_TARBALL_ARTIFACT_NAME: pack-tarball
          PACK_INSTALL_SMOKE_ARTIFACT_NAME: pack-install-smoke
          DOCKER_ACCEPTANCE_ARTIFACT_NAME: docker-acceptance
          RELEASE_VERIFICATION_REPORT_PATH: .generated/release/release-verification-report.json
          RELEASE_VERIFICATION_ASSERTION_PATH: .generated/release/release-verification-assertion.json
          RELEASE_VERIFICATION_SUMMARY_PATH: .generated/release/release-verification-summary.md
          RELEASE_VERIFICATION_REPORT_ARTIFACT_NAME: release-verification-report
          RELEASE_VERIFICATION_ASSERTION_ARTIFACT_NAME: release-verification-assertion
          RELEASE_VERIFICATION_SUMMARY_ARTIFACT_NAME: release-verification-summary
        run: node scripts/ci/write-release-verification-report.mjs

      - name: Assert release verification report
        if: ${{ always() }}
        env:
          RELEASE_VERIFICATION_REPORT_PATH: .generated/release/release-verification-report.json
          RELEASE_VERIFICATION_ASSERTION_PATH: .generated/release/release-verification-assertion.json
        run: node scripts/ci/assert-release-verification-report.mjs

      - name: Write release verification summary
        if: ${{ always() }}
        env:
          RELEASE_VERIFICATION_REPORT_PATH: .generated/release/release-verification-report.json
          RELEASE_VERIFICATION_ASSERTION_PATH: .generated/release/release-verification-assertion.json
          RELEASE_VERIFICATION_SUMMARY_PATH: .generated/release/release-verification-summary.md
        run: node scripts/ci/write-release-verification-summary.mjs

      - name: Rewrite release verification report with final artifact paths
        if: ${{ always() }}
        env:
          PACK_VERIFICATION_PATH: .generated/pack/pack-verification.json
          PACK_INSTALL_SMOKE_PATH: .generated/pack/pack-install-smoke.json
          PACK_TARBALL_DIR: .generated/pack/tarball
          DOCKER_ACCEPTANCE_REPORT_PATH: .generated/docker-acceptance/docker-acceptance-report.json
          PACK_VERIFICATION_ARTIFACT_NAME: pack-verification
          PACK_TARBALL_ARTIFACT_NAME: pack-tarball
          PACK_INSTALL_SMOKE_ARTIFACT_NAME: pack-install-smoke
          DOCKER_ACCEPTANCE_ARTIFACT_NAME: docker-acceptance
          RELEASE_VERIFICATION_REPORT_PATH: .generated/release/release-verification-report.json
          RELEASE_VERIFICATION_ASSERTION_PATH: .generated/release/release-verification-assertion.json
          RELEASE_VERIFICATION_SUMMARY_PATH: .generated/release/release-verification-summary.md
          RELEASE_VERIFICATION_REPORT_ARTIFACT_NAME: release-verification-report
          RELEASE_VERIFICATION_ASSERTION_ARTIFACT_NAME: release-verification-assertion
          RELEASE_VERIFICATION_SUMMARY_ARTIFACT_NAME: release-verification-summary
          RELEASE_VERIFICATION_APPEND_STEP_SUMMARY: "false"
        run: node scripts/ci/write-release-verification-report.mjs

      - name: Upload release verification assertion
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-assertion
          path: .generated/release/release-verification-assertion.json
          if-no-files-found: ignore

      - name: Upload release verification summary
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-summary
          path: .generated/release/release-verification-summary.md
          if-no-files-found: ignore

      - name: Upload release verification report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-report
          path: .generated/release/release-verification-report.json
          if-no-files-found: error

      - name: Configure npm token fallback
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$HOME/.npmrc"
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release PR or publish
        id: changesets
        continue-on-error: true
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          commit: Version packages
          title: Version packages
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write changesets release result
        if: ${{ always() }}
        env:
          CHANGESETS_RELEASE_RESULT_PATH: .generated/release/changesets-release-result.json
          CHANGESETS_STEP_OUTCOME: ${{ steps.changesets.outcome }}
          CHANGESETS_PUBLISHED: ${{ steps.changesets.outputs.published }}
          CHANGESETS_PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: node scripts/ci/write-changesets-release-result.mjs

      - name: Upload changesets release result
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: changesets-release-result
          path: .generated/release/changesets-release-result.json
          if-no-files-found: error

      - name: Assert changesets release result
        if: ${{ always() }}
        env:
          CHANGESETS_RELEASE_RESULT_PATH: .generated/release/changesets-release-result.json
          CHANGESETS_RELEASE_ASSERTION_PATH: .generated/release/changesets-release-assertion.json
        run: node scripts/ci/assert-changesets-release-result.mjs

      - name: Write changesets release summary
        if: ${{ always() }}
        env:
          CHANGESETS_RELEASE_RESULT_PATH: .generated/release/changesets-release-result.json
          CHANGESETS_RELEASE_ASSERTION_PATH: .generated/release/changesets-release-assertion.json
          CHANGESETS_RELEASE_SUMMARY_PATH: .generated/release/changesets-release-summary.md
          CHANGESETS_RELEASE_RESULT_ARTIFACT_NAME: changesets-release-result
          CHANGESETS_RELEASE_ASSERTION_ARTIFACT_NAME: changesets-release-assertion
          CHANGESETS_RELEASE_SUMMARY_ARTIFACT_NAME: changesets-release-summary
          CHANGESETS_RELEASE_REPORT_ARTIFACT_NAME: changesets-release-report
        run: node scripts/ci/write-changesets-release-summary.mjs

      - name: Write changesets release report
        if: ${{ always() }}
        env:
          CHANGESETS_RELEASE_RESULT_PATH: .generated/release/changesets-release-result.json
          CHANGESETS_RELEASE_ASSERTION_PATH: .generated/release/changesets-release-assertion.json
          CHANGESETS_RELEASE_SUMMARY_PATH: .generated/release/changesets-release-summary.md
          CHANGESETS_RELEASE_REPORT_PATH: .generated/release/changesets-release-report.json
          CHANGESETS_RELEASE_RESULT_ARTIFACT_NAME: changesets-release-result
          CHANGESETS_RELEASE_ASSERTION_ARTIFACT_NAME: changesets-release-assertion
          CHANGESETS_RELEASE_SUMMARY_ARTIFACT_NAME: changesets-release-summary
          CHANGESETS_RELEASE_REPORT_ARTIFACT_NAME: changesets-release-report
        run: node scripts/ci/write-changesets-release-report.mjs

      - name: Upload changesets release summary
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: changesets-release-summary
          path: .generated/release/changesets-release-summary.md
          if-no-files-found: error

      - name: Upload changesets release assertion
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: changesets-release-assertion
          path: .generated/release/changesets-release-assertion.json
          if-no-files-found: error

      - name: Upload changesets release report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: changesets-release-report
          path: .generated/release/changesets-release-report.json
          if-no-files-found: error
