name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Run hermetic Docker acceptance
        id: docker-acceptance
        continue-on-error: true
        env:
          EQUIP_DOCKER_ACCEPTANCE_OUTPUT_DIR: .generated/docker-acceptance
        run: npm run test:docker:acceptance

      - name: Upload Docker acceptance artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-acceptance
          path: .generated/docker-acceptance/*
          if-no-files-found: error

      - name: Verify packed npm artifact
        id: pack-verification
        continue-on-error: true
        env:
          PACK_VERIFICATION_OUTPUT_PATH: .generated/pack/pack-verification.json
          PACK_TARBALL_OUTPUT_DIR: .generated/pack/tarball
        run: npm run test:pack

      - name: Smoke install packed npm tarball
        id: pack-install-smoke
        if: ${{ always() }}
        continue-on-error: true
        env:
          PACK_TARBALL_OUTPUT_DIR: .generated/pack/tarball
          PACK_INSTALL_SMOKE_OUTPUT_PATH: .generated/pack/pack-install-smoke.json
        run: npm run test:pack:smoke

      - name: Upload pack verification
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pack-verification
          path: .generated/pack/pack-verification.json
          if-no-files-found: ignore

      - name: Upload packed npm tarball
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pack-tarball
          path: .generated/pack/tarball/*.tgz
          if-no-files-found: ignore

      - name: Upload pack install smoke report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pack-install-smoke
          path: .generated/pack/pack-install-smoke.json
          if-no-files-found: ignore

      - name: Write release verification report
        if: ${{ always() }}
        env:
          PACK_VERIFICATION_PATH: .generated/pack/pack-verification.json
          PACK_INSTALL_SMOKE_PATH: .generated/pack/pack-install-smoke.json
          DOCKER_ACCEPTANCE_REPORT_PATH: .generated/docker-acceptance/docker-acceptance-report.json
          RELEASE_VERIFICATION_REPORT_PATH: .generated/release/release-verification-report.json
        run: node scripts/ci/write-release-verification-report.mjs

      - name: Upload release verification report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-report
          path: .generated/release/release-verification-report.json
          if-no-files-found: error

      - name: Assert release verification report
        if: ${{ always() }}
        env:
          RELEASE_VERIFICATION_REPORT_PATH: .generated/release/release-verification-report.json
        run: node scripts/ci/assert-release-verification-report.mjs

      - name: Configure npm token fallback
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$HOME/.npmrc"
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          commit: Version packages
          title: Version packages
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize published packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          {
            echo "## Published packages"
            echo
            echo '${{ steps.changesets.outputs.publishedPackages }}'
          } >> "$GITHUB_STEP_SUMMARY"
