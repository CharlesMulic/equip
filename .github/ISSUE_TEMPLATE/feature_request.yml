name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what workflow does it improve?
      placeholder: "I want to be able to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.

  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - CLI
        - Platform support
        - Auth / credentials
        - Rules / skills / hooks
        - Registry
        - Library API
        - Documentation
        - Other
    validations:
      required: true
