name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify packed npm artifact
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        env:
          PACK_VERIFICATION_OUTPUT_PATH: .generated/pack/pack-verification.json
          PACK_VERIFICATION_LOG_PATH: .generated/pack/pack-verification.log
          PACK_TARBALL_OUTPUT_DIR: .generated/pack/tarball
        run: npm run test:pack

      - name: Smoke install packed npm tarball
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        env:
          PACK_TARBALL_OUTPUT_DIR: .generated/pack/tarball
          PACK_INSTALL_SMOKE_OUTPUT_PATH: .generated/pack/pack-install-smoke.json
          PACK_INSTALL_SMOKE_LOG_PATH: .generated/pack/pack-install-smoke.log
        run: npm run test:pack:smoke

      - name: Upload pack verification
        if: ${{ always() && matrix.os == 'ubuntu-latest' && matrix.node-version == 22 }}
        uses: actions/upload-artifact@v4
        with:
          name: pack-verification
          path: |
            .generated/pack/pack-verification.json
            .generated/pack/pack-verification.log
          if-no-files-found: ignore

      - name: Upload packed npm tarball
        if: ${{ always() && matrix.os == 'ubuntu-latest' && matrix.node-version == 22 }}
        uses: actions/upload-artifact@v4
        with:
          name: pack-tarball
          path: .generated/pack/tarball/*.tgz
          if-no-files-found: ignore

      - name: Upload pack install smoke report
        if: ${{ always() && matrix.os == 'ubuntu-latest' && matrix.node-version == 22 }}
        uses: actions/upload-artifact@v4
        with:
          name: pack-install-smoke
          path: |
            .generated/pack/pack-install-smoke.json
            .generated/pack/pack-install-smoke.log
          if-no-files-found: ignore

  docker-acceptance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Verify Docker availability
        run: docker version

      - name: Run hermetic Docker acceptance
        env:
          EQUIP_DOCKER_ACCEPTANCE_OUTPUT_DIR: .generated/docker-acceptance
        run: node scripts/ci/run-docker-acceptance.mjs

      - name: Upload Docker acceptance artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-acceptance
          path: .generated/docker-acceptance/*
          if-no-files-found: error

  verification-report:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - docker-acceptance

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download pack verification
        id: download-pack-verification
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: pack-verification
          path: .generated/downloaded/pack-verification

      - name: Download pack install smoke report
        id: download-pack-install-smoke
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: pack-install-smoke
          path: .generated/downloaded/pack-install-smoke

      - name: Download packed npm tarball
        id: download-pack-tarball
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: pack-tarball
          path: .generated/downloaded/pack-tarball

      - name: Download Docker acceptance artifacts
        id: download-docker-acceptance
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: docker-acceptance
          path: .generated/downloaded/docker-acceptance

      - name: Write release verification report
        env:
          PACK_VERIFICATION_PATH: .generated/downloaded/pack-verification/pack-verification.json
          PACK_INSTALL_SMOKE_PATH: .generated/downloaded/pack-install-smoke/pack-install-smoke.json
          PACK_TARBALL_DIR: .generated/downloaded/pack-tarball
          DOCKER_ACCEPTANCE_REPORT_PATH: .generated/downloaded/docker-acceptance/docker-acceptance-report.json
          PACK_VERIFICATION_ARTIFACT_NAME: pack-verification
          PACK_TARBALL_ARTIFACT_NAME: pack-tarball
          PACK_INSTALL_SMOKE_ARTIFACT_NAME: pack-install-smoke
          DOCKER_ACCEPTANCE_ARTIFACT_NAME: docker-acceptance
          RELEASE_VERIFICATION_REPORT_PATH: .generated/release/release-verification-report.json
          RELEASE_VERIFICATION_ASSERTION_PATH: .generated/release/release-verification-assertion.json
          RELEASE_VERIFICATION_SUMMARY_PATH: .generated/release/release-verification-summary.md
          RELEASE_VERIFICATION_REPORT_ARTIFACT_NAME: release-verification-report
          RELEASE_VERIFICATION_ASSERTION_ARTIFACT_NAME: release-verification-assertion
          RELEASE_VERIFICATION_SUMMARY_ARTIFACT_NAME: release-verification-summary
        run: node scripts/ci/write-release-verification-report.mjs

      - name: Assert release verification report
        if: ${{ always() }}
        env:
          RELEASE_VERIFICATION_REPORT_PATH: .generated/release/release-verification-report.json
          RELEASE_VERIFICATION_ASSERTION_PATH: .generated/release/release-verification-assertion.json
        run: node scripts/ci/assert-release-verification-report.mjs

      - name: Write release verification summary
        if: ${{ always() }}
        env:
          RELEASE_VERIFICATION_REPORT_PATH: .generated/release/release-verification-report.json
          RELEASE_VERIFICATION_ASSERTION_PATH: .generated/release/release-verification-assertion.json
          RELEASE_VERIFICATION_SUMMARY_PATH: .generated/release/release-verification-summary.md
        run: node scripts/ci/write-release-verification-summary.mjs

      - name: Rewrite release verification report with final artifact paths
        if: ${{ always() }}
        env:
          PACK_VERIFICATION_PATH: .generated/downloaded/pack-verification/pack-verification.json
          PACK_INSTALL_SMOKE_PATH: .generated/downloaded/pack-install-smoke/pack-install-smoke.json
          PACK_TARBALL_DIR: .generated/downloaded/pack-tarball
          DOCKER_ACCEPTANCE_REPORT_PATH: .generated/downloaded/docker-acceptance/docker-acceptance-report.json
          PACK_VERIFICATION_ARTIFACT_NAME: pack-verification
          PACK_TARBALL_ARTIFACT_NAME: pack-tarball
          PACK_INSTALL_SMOKE_ARTIFACT_NAME: pack-install-smoke
          DOCKER_ACCEPTANCE_ARTIFACT_NAME: docker-acceptance
          RELEASE_VERIFICATION_REPORT_PATH: .generated/release/release-verification-report.json
          RELEASE_VERIFICATION_ASSERTION_PATH: .generated/release/release-verification-assertion.json
          RELEASE_VERIFICATION_SUMMARY_PATH: .generated/release/release-verification-summary.md
          RELEASE_VERIFICATION_REPORT_ARTIFACT_NAME: release-verification-report
          RELEASE_VERIFICATION_ASSERTION_ARTIFACT_NAME: release-verification-assertion
          RELEASE_VERIFICATION_SUMMARY_ARTIFACT_NAME: release-verification-summary
          RELEASE_VERIFICATION_APPEND_STEP_SUMMARY: "false"
        run: node scripts/ci/write-release-verification-report.mjs

      - name: Upload release verification assertion
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-assertion
          path: .generated/release/release-verification-assertion.json
          if-no-files-found: ignore

      - name: Upload release verification summary
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-summary
          path: .generated/release/release-verification-summary.md
          if-no-files-found: ignore

      - name: Upload release verification report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-report
          path: .generated/release/release-verification-report.json
          if-no-files-found: error
