name: Bug Report
description: Report a bug in equip
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run `equip prior`, it fails with..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `equip ...`
        2. See error
    validations:
      required: true

  - type: input
    id: equip-version
    attributes:
      label: Equip version
      description: Output of `equip --version`
      placeholder: "0.17.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: AI platform(s) affected
      multiple: true
      options:
        - Claude Code
        - Cursor
        - VS Code / Copilot
        - Windsurf
        - Cline
        - Roo Code
        - Codex
        - Gemini CLI
        - Junie
        - Amazon Q
        - Tabnine
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v22.0.0"

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any relevant output. Run with `--verbose` for more detail.
      render: shell
